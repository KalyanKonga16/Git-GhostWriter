groups:
  - name: redis
    envVars:
      - key: REDIS_URL
        sync: false
  - name: groq
    envVars:
      - key: GROQ_API_KEY
        sync: false
  - name: r2
    envVars:
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_DOMAIN
        sync: false
